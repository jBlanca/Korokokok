name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Korokokok? We'd love to hear it.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Why is this useful?
      description: What problem does this solve or what workflow does it improve?
    validations:
      required: true

  - type: dropdown
    id: workspace
    attributes:
      label: Related workspace
      options:
        - Project Manager
        - Editor
        - Visual (Image Generation)
        - Narration
        - Music
        - Assembly Line
        - AI Playground
        - General / Multiple
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of?
    validations:
      required: false
