name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Korokokok Version
      description: Which version are you using? (Check Settings or the title bar)
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: dropdown
    id: workspace
    attributes:
      label: Which workspace?
      options:
        - Project Manager
        - Editor
        - Visual (Image Generation)
        - Narration
        - Music
        - Assembly Line
        - AI Playground
        - Other / Multiple
    validations:
      required: true

  - type: textarea
    id: system
    attributes:
      label: System info
      description: Your GPU, VRAM, Windows version, and RAM
      placeholder: |
        GPU: NVIDIA RTX 3060 (12 GB)
        RAM: 32 GB
        Windows: 11 Pro
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: If applicable, add screenshots or paste error logs.
    validations:
      required: false
